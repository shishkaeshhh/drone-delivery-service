name: Test and Deploy Drone Platform

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: drone_db
          POSTGRES_USER: drone_user
          POSTGRES_PASSWORD: drone_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379

    env:
      SECRET_KEY: django-insecure-ci-key
      DEBUG: "False"
      DB_NAME: drone_db
      DB_USER: drone_user
      DB_PASSWORD: drone_password
      DB_HOST: localhost
      DB_PORT: 5432
      REDIS_URL: redis://localhost:6379/0

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run migrations check
        run: python manage.py makemigrations --check --dry-run

      - name: Run tests
        run: python manage.py test

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    env:
      SERVER_HOST: ${{ secrets.SERVER_HOST }}
      SERVER_USER: ${{ secrets.SERVER_USER }}
      SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
      SERVER_SSH_PORT: ${{ secrets.SERVER_SSH_PORT }}
      PROJECT_PATH: ${{ secrets.PROJECT_PATH }}

    steps:
      - name: Check deployment secrets
        id: deploy_secrets
        run: |
          if [ -n "$SERVER_HOST" ] && [ -n "$SERVER_USER" ] && [ -n "$SERVER_SSH_KEY" ] && [ -n "$SERVER_SSH_PORT" ] && [ -n "$PROJECT_PATH" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Deployment skipped because one or more SSH secrets are missing. Required: SERVER_HOST, SERVER_USER, SERVER_SSH_KEY, SERVER_SSH_PORT, PROJECT_PATH."
          fi

      - name: Deploy to server via SSH
        if: steps.deploy_secrets.outputs.ready == 'true'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.SERVER_HOST }}
          username: ${{ env.SERVER_USER }}
          key: ${{ env.SERVER_SSH_KEY }}
          port: ${{ env.SERVER_SSH_PORT }}
          script: |
            set -e
            cd ${{ env.PROJECT_PATH }}
            git fetch origin main
            git reset --hard origin/main
            docker compose down
            docker compose build --pull
            docker compose up -d
            docker compose exec -T web python manage.py migrate
            docker compose exec -T web python manage.py collectstatic --noinput
            docker compose exec -T web python manage.py test
