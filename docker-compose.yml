version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: drone_db
      POSTGRES_USER: drone_user
      POSTGRES_PASSWORD: drone_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  web:
    build: .
    command: >
      bash -c "python manage.py migrate &&
               python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    environment:
      - DB_NAME=drone_db
      - DB_USER=drone_user
      - DB_PASSWORD=drone_password
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_URL=redis://redis:6379/0

volumes:
  postgres_data:
